net:
  isbg:
    currency:
      collector:
        fixer_io_api_endpoint: https://data.fixer.io/api
        fixer_io_api_key: your_api_key_here
        fixer_io_mock: true
        refresh_interval: 5000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/currency_gateway
    driver-class-name: org.postgresql.Driver
    username: currency_gateway
    password: currency_gateway_pass
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  main:
    keep-alive: true
logging:
  level:
    net:
      isbg:
        currency: DEBUG
